name: Build Pipeline

on:
  push:
    branches-ignore: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Code Style Check
        run: ./mvnw checkstyle:check -Pcheckstyle -B

      - name: Unit Tests
        run: ./mvnw test -Punit -B

      - name: Integration Tests
        run: ./mvnw test -Pint -B -Djunit.jupiter.execution.parallel.enabled=false

      - name: Coverage Check
        run: ./mvnw jacoco:report jacoco:check -B
