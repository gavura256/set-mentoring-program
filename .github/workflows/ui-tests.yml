name: UI Tests

on:
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run UI tests against'
        type: choice
        options: [chromium, firefox, webkit]
        default: chromium

concurrency:
  group: ui-${{ github.ref }}-${{ inputs.browser }}
  cancel-in-progress: true

jobs:
  ui:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ inputs.browser }}

      - name: UI Smoke Tests
        run: ./mvnw test -Pui -Dframework.browser=${{ inputs.browser }} -B

      - name: Generate Allure Report
        if: always()
        run: ./mvnw allure:report -B

      - name: Publish Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ inputs.browser }}
          path: target/site/allure-maven-plugin/

      - name: Publish Playwright Traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ inputs.browser }}
          path: target/traces/

      - name: Publish Failure Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ inputs.browser }}
          path: target/screenshots/
