name: Claude Code Review

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Prepare PR context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          git diff ${BASE}..${HEAD} > pr.diff
          git diff --name-only ${BASE}..${HEAD} > pr.changed
          echo "$HEAD" > .head_sha
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Read pr.diff to see what changed. Read pr.changed for the file
            list, then Read each changed source file individually — the
            Read tool shows accurate per-file line numbers. Review against
            .claude/agents/pr-code-reviewer.md. Write review.json.
            Do not use Bash. Do not fetch anything.
          show_full_output: true
          claude_args: "--model claude-haiku-4-5 --max-turns 10 --allowed-tools Read,Write"
      - name: Submit review
        if: always()
        run: |
          if [ -f review.json ]; then
            REVIEW=$(cat review.json)
            SHA=$(cat .head_sha)
            BODY=$(echo "$REVIEW" | jq --arg sha "$SHA" \
              '{event, body} + if .comments then {comments, commit_id: $sha} else {} end')
            echo "=== Payload ==="
            echo "$BODY" | jq .
            echo "=== API response ==="
            curl -s -w "\nHTTP %{http_code}" -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews" \
              -d "$BODY"
            echo ""
          else
            echo "review.json not found"
          fi
