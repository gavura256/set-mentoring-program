name: Claude Code Review

on:
  pull_request:
    types: [ opened, synchronize ]

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          settings: |
            {
              "env": {
                "GH_TOKEN": "${{ secrets.GITHUB_TOKEN }}",
                "GITHUB_TOKEN": "${{ secrets.GITHUB_TOKEN }}",
                "PR_NUMBER": "${{ github.event.pull_request.number }}",
                "REPO_OWNER": "${{ github.repository_owner }}",
                "REPO_NAME": "${{ github.event.repository.name }}"
              }
            }
          prompt: |
            Review this PR diff as defined in .claude/agents/pr-code-reviewer.md.
            PR_NUMBER, REPO_OWNER, and REPO_NAME are in your environment.
            You must execute the final review command — do not stop at
            describing what you found.
          show_full_output: true
          claude_args: "--model claude-haiku-4-5"
