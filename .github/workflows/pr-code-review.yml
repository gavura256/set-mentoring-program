name: Claude Code Review

on:
  pull_request:
    types: [ opened, synchronize ]

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Prepare PR context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > pr.diff
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Read pr.diff — review it against .claude/agents/pr-code-reviewer.md.

            Write your review to review.json in this format:
            {"event":"APPROVE","body":"your review text"}

            Use REQUEST_CHANGES instead of APPROVE if issues found.
            Use the Write tool. Do not use Bash. Do not fetch anything.
          show_full_output: true
          claude_args: "--model claude-haiku-4-5 --max-turns 5 --allowed-tools Read,Write"
      - name: Submit review
        if: always()
        run: |
          if [ -f review.json ]; then
            curl -s -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews" \
              -d "$(cat review.json)"
          else
            echo "review.json not found — Claude did not produce a review"
          fi
