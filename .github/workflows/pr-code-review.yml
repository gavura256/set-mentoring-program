name: Claude Code Review

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Prepare PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          git diff ${BASE}..${HEAD} -- '*.java' '*.xml' '*.yml' '*.yaml' '*.properties' > pr.diff
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Read pr.diff. Review against .claude/agents/pr-code-reviewer.md.
            Write review.txt. First line: approve or request_changes.
            Remaining lines: your review body.
            Do not use Bash. Do not fetch anything.
          show_full_output: true
          claude_args: "--model claude-sonnet-4-6 --max-turns 20 --allowed-tools Read,Write"
      - name: Submit review
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f review.txt ]; then
            EVENT=$(head -1 review.txt | tr '[:upper:]' '[:lower:]')
            tail -n +3 review.txt > review-body.txt
            echo "=== Event: $EVENT ==="
            cat review-body.txt
            gh pr review ${{ github.event.pull_request.number }} \
              --${EVENT} --body-file review-body.txt
          else
            echo "review.txt not found"
          fi
