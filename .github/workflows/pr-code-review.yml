name: Claude Code Review

on:
  pull_request:
    types: [ opened, synchronize ]

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate gh CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            PR number: ${{ github.event.pull_request.number }}

            Review this PR diff as defined in .claude/agents/pr-code-reviewer.md.
            Your final action must execute the gh pr review command —
            APPROVE if clean, REQUEST CHANGES if issues found.
            Do not stop at describing what you found.
          show_full_output: true
          claude_args: "--model claude-haiku-4-5"
