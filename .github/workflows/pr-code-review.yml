name: Claude Code Review

on:
  pull_request:
    types: [ opened, synchronize ]

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Prepare PR context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > pr.diff
          echo "${{ secrets.GITHUB_TOKEN }}" > .review_token
          echo "${{ github.event.pull_request.number }}" > .pr_number
          cat > submit_review.sh << 'SCRIPT'
          #!/bin/bash
          TOKEN=$(cat .review_token)
          PR=$(cat .pr_number)
          EVENT="$1"
          BODY="$2"
          curl -s -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/$PR/reviews" \
            -d "$(jq -n --arg event "$EVENT" --arg body "$BODY" '{event: $event, body: $body}')"
          SCRIPT
          chmod +x submit_review.sh
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Read pr.diff — it contains the full PR diff. Review it against
            the criteria in .claude/agents/pr-code-reviewer.md.

            Then submit: bash submit_review.sh APPROVE "your review"
            Use REQUEST_CHANGES instead of APPROVE if issues found.

            Do not fetch anything. Read pr.diff, review, submit. Done.
          show_full_output: true
          claude_args: "--model claude-haiku-4-5 --max-turns 5"
