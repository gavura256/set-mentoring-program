name: Claude Code Review

on:
  pull_request:
    types: [ opened, synchronize ]

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Prepare PR context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git diff ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} > pr.diff
          echo "${{ github.event.pull_request.head.sha }}" > .head_sha
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Read pr.diff to see what changed. Then Read the actual source
            files to get correct line numbers (the Read tool shows them).
            Review against .claude/agents/pr-code-reviewer.md.
            Write review.json. Do not use Bash. Do not fetch anything.
          show_full_output: true
          claude_args: "--model claude-haiku-4-5 --max-turns 10 --allowed-tools Read,Write"
      - name: Submit review
        if: always()
        run: |
          if [ -f review.json ] && [ -f .head_sha ]; then
            SHA=$(cat .head_sha)
            REVIEW=$(cat review.json)
            BODY=$(echo "$REVIEW" | jq --arg sha "$SHA" \
              '{event, body, commit_id: $sha} + if .comments then {comments} else {} end')
            echo "=== Merged payload ==="
            echo "$BODY" | jq .
            echo "=== API response ==="
            curl -s -w "\nHTTP %{http_code}" -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews" \
              -d "$BODY"
            echo ""
          else
            echo "review.json or .head_sha not found"
            ls -la review.json .head_sha 2>/dev/null || true
          fi