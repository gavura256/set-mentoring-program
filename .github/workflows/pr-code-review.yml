name: Claude Code Review

on:
  pull_request:
    types: [ opened, synchronize ]

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Prepare PR context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > pr.diff
          echo "PR_NUMBER=${{ github.event.pull_request.number }}" > .pr_env
          echo "REPO=${{ github.repository }}" >> .pr_env
          echo "TOKEN=${{ secrets.GITHUB_TOKEN }}" >> .pr_env
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          additional_permissions: |
            - Bash
            - Read
          prompt: |
            Read pr.diff — review it against .claude/agents/pr-code-reviewer.md.

            Then source .pr_env and submit inline with curl:
              source .pr_env
              curl -X POST \
                -H "Authorization: Bearer $TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/reviews" \
                -d '{"event":"APPROVE","body":"...your review here..."}'

            Use REQUEST_CHANGES if issues found. Execute the curl, do not
            stop at describing findings. Do not use script files.
          show_full_output: true
          claude_args: "--model claude-haiku-4-5 --max-turns 5"
