spring:
  datasource:
    url: jdbc:h2:mem:bookshopDb;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS bookshopDb
    username: sa
    password: password
    driverClassName: org.h2.Driver
    name: bookshopDb
  jpa:
    hibernate:
      ddl-auto: create
      default_schema: bookshopDb
  h2:
    console:
      enabled: true
      path: /h2-console
