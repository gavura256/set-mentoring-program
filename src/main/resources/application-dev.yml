spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:appDb;DB_CLOSE_DELAY=-1;MODE=MySQL;INIT=CREATE SCHEMA IF NOT EXISTS appDb
    username: sa
    password: password
    name: appDb
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false
  jpa:
    # Disable OSIV — avoids lazy-loading traps and prevents
    # JPA session conflicts with @Transactional integration tests.
    open-in-view: false
    hibernate:
      ddl-auto: validate

logging:
  file:
    name: app.log
