spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:appDb;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS appDb
    username: sa
    password: password
    name: appDb
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false
  jpa:
    hibernate:
      #change ddl-auto to 'update' if you don't want to clean data each time
      ddl-auto: create
