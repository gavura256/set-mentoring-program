server:
  port: 8080

#change profile to 'prod' if you want to use mysql database (don't forget to start related container using docker-compose up -d)
spring:
  profiles:
    active: dev
  jpa:
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  file:
    name: app.log
  level:
    com:
      bookshop: DEBUG
    org:
      springframework: INFO
